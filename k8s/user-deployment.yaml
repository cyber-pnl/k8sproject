apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: default
  labels:
    app: user-service
    tier: backend
   
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        tier: backend
    spec:
      containers:
        - name: user-service
          image: ghcr.io/cyber-pnl/k8sproject/user-service:436e93a45c1d2a2aacf3027a81427648f95eb318
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: app-secret
            - secretRef:
                name: postgres-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
