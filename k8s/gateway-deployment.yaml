apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: default
  labels:
    app: gateway-service
    tier: gateway
   
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
        tier: gateway
    spec:
      containers:
        - name: gateway-service
          image: ghcr.io/cyber-pnl/k8sproject/gateway-service:64c0792021c5e18a1ea5e18f88c6b5ac5ee920e9
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3001"
            - name: USER_SERVICE_URL
              value: "http://user-service:3002"
            - name: FRONTEND_URL
              value: "http://frontend-service:3003"
            - name: REDIS_URL
              value: "redis://redis-service:6379"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SESSION_SECRET
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"