name: CI/CD Pipeline - Test & Deploy to Minikube

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service]  # Only services with tests; add others when ready
      fail-fast: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'services/${{ matrix.service }}/package-lock.json'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: List test files
        working-directory: services/${{ matrix.service }}
        run: find tests -name "*.test.js" -o -name "*.spec.js" || echo "No test files found"

      - name: Run tests with coverage
        working-directory: services/${{ matrix.service }}
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/coverage/
            services/${{ matrix.service }}/coverage.lcov
          retention-days: 30

      - name: Upload test results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/jest-report.xml || true
          retention-days: 30

  deploy:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup and Start Minikube
        run: |
          if ! command -v minikube &> /dev/null; then
            echo "Minikube non trouve, installation..."
            curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
            sudo install minikube-linux-amd64 /usr/local/bin/minikube
            rm minikube-linux-amd64
            echo "Minikube installe avec succes"
          else
            echo "Minikube deja installe — version : $(minikube version)"
          fi

          echo "Demarrage de Minikube..."
          minikube start

      - name: Configure Minikube Docker env
        run: eval $(minikube docker-env)

      - name: Build images
        run: |
          eval $(minikube docker-env)
          docker build -t auth-service:latest services/auth-service
          docker build -t user-service:latest services/user-service
          docker build -t gateway-service:latest services/gateway-service
          docker build -t frontend-service:latest services/frontend-service

      - name: Create Kubernetes secrets
        run: |
          kubectl create secret generic postgres-secret \
            --from-literal=POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic app-secret \
            --from-literal=SESSION_SECRET=${{ secrets.SESSION_SECRET }} \
            --from-literal=database-url=${{ secrets.DATABASE_URL }} \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic admin-credentials \
            --from-literal=admin-password=${{ secrets.ADMIN_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        run: kubectl apply -f k8s/

      - name: Wait for pods ready
        run: kubectl wait --for=condition=ready pod --all --timeout=300s
