name: CI/CD Pipeline - Test & Deploy to Minikube

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'services/${{ matrix.service }}/package-lock.json'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci --prefer-offline --legacy-peer-deps

      - name: Run tests with coverage + JUnit reporter
        working-directory: services/${{ matrix.service }}
        run: |
          npm run test:coverage -- --passWithNoTests \
            --ci \
            --reporters=default \
            --reporters=jest-junit \
            --coverage
        env:
          JEST_JUNIT_OUTPUT_DIR: ./coverage
          JEST_JUNIT_OUTPUT_NAME: jest-report.xml
          JEST_JUNIT_SUITE_NAME: "{title}"
          JEST_JUNIT_CLASSNAME_TEMPLATE: "{classname}-{title}"
          JEST_JUNIT_TITLE_TEMPLATE: "{title}"

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'services/${{ matrix.service }}/coverage/jest-report.xml'
          fail_on_failure: false
          include_passed: true
          detailed_summary: true

      - name: Upload coverage & test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/coverage/
          retention-days: 14

  deploy:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup and Start Minikube
        run: |
          set -euo pipefail
          if ! command -v minikube &> /dev/null; then
            echo "Minikube non trouvé, installation..."
            curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
            sudo install minikube-linux-amd64 /usr/local/bin/minikube
            rm minikube-linux-amd64
          fi
          minikube start

      - name: Configure Minikube Docker env
        run: eval $(minikube docker-env)

      - name: Build Docker images
        run: |
          eval $(minikube docker-env)
          docker build -t auth-service:latest services/auth-service
          docker build -t user-service:latest services/user-service
          docker build -t gateway-service:latest services/gateway-service
          docker build -t frontend-service:latest services/frontend-service

      - name: Create Kubernetes secrets
        run: |
          kubectl create secret generic postgres-secret \
            --from-literal=POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic app-secret \
            --from-literal=SESSION_SECRET=${{ secrets.SESSION_SECRET }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        run: kubectl apply -f k8s/

      - name: Wait for pods ready
        run: kubectl wait --for=condition=ready pod --all --timeout=300s

