name: CI/CD Pipeline - Test & Deploy to Minikube

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '20'

# Permissions globales minimales
permissions:
  contents: read
  packages: write     # Pour push vers GHCR
  checks: write       # Pour les rapports de tests (si tu réactives JUnit)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== LINTING ==========
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci --prefer-offline --legacy-peer-deps

      - name: Run linting
        working-directory: services/${{ matrix.service }}
        run: npm run lint --if-present || echo "No lint script defined for ${{ matrix.service }}"

  # ========== TESTS & COVERAGE ==========
  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci --prefer-offline --legacy-peer-deps --verbose

      - name: Run tests with coverage + JUnit
        working-directory: services/${{ matrix.service }}
        run: |
          npm run test:coverage -- \
            --passWithNoTests \
            --ci \
            --maxWorkers=2 \
            --coverage \
            --coverageDirectory=./coverage \
            --reporters=default \
            --reporters=jest-junit
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: ./coverage
          JEST_JUNIT_OUTPUT_NAME: jest-report.xml

      - name: Debug - List generated files
        if: always()
        working-directory: services/${{ matrix.service }}
        run: ls -laR coverage/ || true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/
          retention-days: 30
          compression-level: 9

  # ========== SECURITY SCANNING ==========
  security:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci --prefer-offline --legacy-peer-deps

      - name: Run npm audit
        working-directory: services/${{ matrix.service }}
        run: npm audit --audit-level=moderate || echo "Audit completed with warnings"

  # ========== BUILD & PUSH DOCKER IMAGES ==========
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service, frontend-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== DEPLOYMENT TO MINIKUBE (self-hosted) ==========
  deploy:
    needs: [test, build, security]
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Check & Start Minikube
        run: |
          set -euo pipefail
          if ! command -v minikube &> /dev/null; then
            echo "Installing Minikube..."
            curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
            sudo install minikube-linux-amd64 /usr/local/bin/minikube
            rm minikube-linux-amd64
          fi
          minikube status || minikube start --cpus=4 --memory=8192 --driver=docker

      - name: Configure Docker & kubectl for Minikube
        run: |
          eval $(minikube docker-env --shell=bash)
          echo "DOCKER_HOST=$DOCKER_HOST" >> $GITHUB_ENV
          minikube kubectl -- version --client

      - name: Pull images from GHCR into Minikube
        run: |
          eval $(minikube docker-env --shell=bash)
          for service in auth-service user-service gateway-service frontend-service; do
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}/$service:${{ github.sha }}
            docker tag ${{ env.REGISTRY }}/${{ github.repository }}/$service:${{ github.sha }} $service:${{ github.sha }}
          done

      - name: Create namespace
        run: |
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace production name=production --overwrite

      - name: Create secrets
        run: |
          kubectl create secret generic postgres-secret \
            --from-literal=POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            -n production --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic app-secret \
            --from-literal=SESSION_SECRET=${{ secrets.SESSION_SECRET }} \
            -n production --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/ -n production
          kubectl rollout status deployment --all -n production --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods,svc,ingress -n production
          kubectl wait --for=condition=ready pod --all -n production --timeout=300s || true

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed - Rolling back..."
          kubectl rollout undo deployment --all -n production || true