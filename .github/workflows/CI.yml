name: CI Pipeline - Test 

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '20'

# Permissions globales minimales
permissions:
  contents: write
  packages: write     # Pour push vers GHCR
  checks: write       # Pour les rapports de tests (si tu réactives JUnit)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== LINTING ==========
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Run linting
        working-directory: services/${{ matrix.service }}
        run: npm run lint --if-present || echo "No lint script defined for ${{ matrix.service }}"

  # ========== TESTS & COVERAGE ==========
  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Run tests with coverage + JUnit
        working-directory: services/${{ matrix.service }}
        run: |
          npm run test:coverage -- \
            --passWithNoTests \
            --ci \
            --maxWorkers=2 \
            --coverage \
            --coverageDirectory=./coverage \
            --reporters=default \
            --reporters=jest-junit
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: ./coverage
          JEST_JUNIT_OUTPUT_NAME: jest-report.xml

      - name: Debug - List generated files
        if: always()
        working-directory: services/${{ matrix.service }}
        run: ls -laR coverage/ || true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/
          retention-days: 30
          compression-level: 9

  # ========== SECURITY SCANNING ==========
  security:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install 

      - name: Run npm audit
        working-directory: services/${{ matrix.service }}
        run: npm audit --audit-level=moderate || echo "Audit completed with warnings"

# ========== BUILD & PUSH DOCKER IMAGES ==========
  build-push:
    needs: [test, security]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Ta liste complète de services
        service: [auth-service, frontend-service, gateway-service, user-service]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          # On utilise le SHA du commit pour un tag unique
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest

  # ========== UPDATE KUBERNETES MANIFESTS ==========
  delivery:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Image Tags in YAML
        run: |
          # On définit le préfixe de l'image (en minuscule pour éviter les erreurs GHCR)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_BASE="${{ env.REGISTRY }}/${REPO_LOWER}"
          
          # Mise à jour de chaque fichier YAML dans ton dossier /k8s
          # On remplace l'image existante par celle avec le nouveau SHA du commit
          sed -i "s|image: ${IMAGE_BASE}/auth-service:.*|image: ${IMAGE_BASE}/auth-service:${{ github.sha }}|g" k8s/auth-deployment.yaml
          sed -i "s|image: ${IMAGE_BASE}/frontend-service:.*|image: ${IMAGE_BASE}/frontend-service:${{ github.sha }}|g" k8s/frontend-deployment.yaml
          sed -i "s|image: ${IMAGE_BASE}/gateway-service:.*|image: ${IMAGE_BASE}/gateway-service:${{ github.sha }}|g" k8s/gateway-deployment.yaml
          sed -i "s|image: ${IMAGE_BASE}/user-service:.*|image: ${IMAGE_BASE}/user-service:${{ github.sha }}|g" k8s/user-deployment.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/*.yaml
          # [skip ci] est crucial pour éviter une boucle infinie de CI
          git commit -m "chore: update images to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push