name: CI - Quality & Security

on:
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install & Lint
        working-directory: services/${{ matrix.service }}
        run: |
          npm install
          npm run lint --if-present

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install & Test
        working-directory: services/${{ matrix.service }}
        run: |
          npm install
          npm run test:coverage -- --passWithNoTests --ci --reporters=default --reporters=jest-junit
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: ./coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/

  security:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
    steps:
      - uses: actions/checkout@v4
      - name: npm audit
        working-directory: services/${{ matrix.service }}
        run: |
          npm install
          npm audit --audit-level=moderate || echo "Warnings found"