name: CI/CD Pipeline - Test & Deploy to Minikube

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '20'

# Permissions globales minimales
permissions:
  contents: read
  packages: write     # Pour push vers GHCR
  checks: write       # Pour les rapports de tests (si tu réactives JUnit)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== LINTING ==========
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Run linting
        working-directory: services/${{ matrix.service }}
        run: npm run lint --if-present || echo "No lint script defined for ${{ matrix.service }}"

  # ========== TESTS & COVERAGE ==========
  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Run tests with coverage + JUnit
        working-directory: services/${{ matrix.service }}
        run: |
          npm run test:coverage -- \
            --passWithNoTests \
            --ci \
            --maxWorkers=2 \
            --coverage \
            --coverageDirectory=./coverage \
            --reporters=default \
            --reporters=jest-junit
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: ./coverage
          JEST_JUNIT_OUTPUT_NAME: jest-report.xml

      - name: Debug - List generated files
        if: always()
        working-directory: services/${{ matrix.service }}
        run: ls -laR coverage/ || true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/
          retention-days: 30
          compression-level: 9

  # ========== SECURITY SCANNING ==========
  security:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, gateway-service]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install 

      - name: Run npm audit
        working-directory: services/${{ matrix.service }}
        run: npm audit --audit-level=moderate || echo "Audit completed with warnings"
